<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-label="Hanga Works">
  <title>Hanga Works</title>
  <desc>Hanga Works logo — hiring and skills training platform</desc>

  <defs>
    <style>
      .hw-bar-1 { fill: #4F6EF7; opacity: 0.45; }
      .hw-bar-2 { fill: #4F6EF7; opacity: 0.72; }
      .hw-bar-3 { fill: #4F6EF7; }
      .hw-head-1 { fill: #4F6EF7; opacity: 0.45; }
      .hw-head-2 { fill: #4F6EF7; opacity: 0.72; }
      .hw-head-3 { fill: #4F6EF7; }
      .hw-arc    { fill: none; stroke: #F7934F; stroke-width: 1.5; stroke-linecap: round; stroke-dasharray: 3 2.5; }
      .hw-ring   { fill: none; stroke: #4F6EF7; stroke-width: 2.2; stroke-linecap: round; }
      .hw-spark  { fill: #F7934F; }
      .hw-name   { font-family: 'DM Sans', 'Segoe UI', sans-serif; font-size: 22px; font-weight: 600; fill: #1a1a2e; letter-spacing: -0.5px; }
      .hw-works  { fill: #4F6EF7; }
      .hw-tag    { font-family: 'DM Sans', 'Segoe UI', sans-serif; font-size: 7.5px; font-weight: 400; fill: #888; letter-spacing: 2.2px; }

      @media (prefers-color-scheme: dark) {
        .hw-name { fill: #f0f0f8; }
        .hw-tag  { fill: #aaa; }
      }
    </style>
  </defs>

  <!-- Icon mark (fits in 0 0 56 64) -->
  <!-- Outer arc -->
  <path class="hw-ring" d="M 10 48 A 24 24 0 1 1 50 48"/>

  <!-- Rising bars -->
  <rect class="hw-bar-1" x="16" y="38" width="7" height="12" rx="2"/>
  <rect class="hw-bar-2" x="27" y="28" width="7" height="22" rx="2"/>
  <rect class="hw-bar-3" x="38" y="18" width="7" height="32" rx="2"/>

  <!-- Person heads -->
  <circle class="hw-head-1" cx="19.5" cy="33" r="4"/>
  <circle class="hw-head-2" cx="30.5" cy="23" r="4"/>
  <circle class="hw-head-3" cx="41.5" cy="13" r="4"/>

  <!-- Dashed connecting arc -->
  <path class="hw-arc" d="M 19.5 29 Q 30.5 19 41.5 9"/>

  <!-- Spark star -->
  <path class="hw-spark" d="M 46 7 L 47.4 3.2 L 48.8 7 L 52.6 8.4 L 48.8 9.8 L 47.4 13.6 L 46 9.8 L 42.2 8.4 Z"/>

  <!-- Wordmark -->
  <text class="hw-name" x="62" y="36">Hanga<tspan class="hw-works">Works</tspan></text>

  <!-- Tagline -->
  <text class="hw-tag" x="63" y="51">HIRE · TRAIN · GROW</text>

</svg>
