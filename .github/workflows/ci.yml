name: CI

on:
  push:
    branches: [ main, development, Blaise ]
  pull_request:
    branches: [ main, development ]

jobs:
  backend:
    name: Backend — lint, build & test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/hanga_test"
      JWT_SECRET: "ci-test-secret"
      REDIS_HOST: "localhost"
      REDIS_PORT: "6379"
      PORT: "3000"
      APP_URL: "http://localhost:3000"
      CLOUDINARY_CLOUD_NAME: "ci"
      CLOUDINARY_API_KEY: "ci"
      CLOUDINARY_API_SECRET: "ci"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hanga_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Run backend lint
        working-directory: backend
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build backend
        working-directory: backend
        run: npx tsc -p .

      - name: Run backend tests
        working-directory: backend
        run: npm run test --if-present
        continue-on-error: true

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: ignore

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: "https://hanga-works-api.onrender.com/api/v1"
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: ignore
