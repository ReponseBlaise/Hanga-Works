<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1400" viewBox="0 0 1800 1400" role="img" aria-labelledby="title desc">
  <title id="title">SEWI Platform ERD</title>
  <desc id="desc">Simplified entity relationship diagram generated from the backend Prisma schema.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 14; }
      .entity { fill: #1f2937; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .entity2 { fill: #1e293b; stroke: #34d399; stroke-width: 2; rx: 12; }
      .entity3 { fill: #1f2937; stroke: #f59e0b; stroke-width: 2; rx: 12; }
      .title { fill: #e5e7eb; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #cbd5e1; font: 400 14px Arial, sans-serif; }
      .ename { fill: #f8fafc; font: 700 20px Arial, sans-serif; }
      .attr { fill: #cbd5e1; font: 14px Consolas, monospace; }
      .rel { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .rel2 { stroke: #fbbf24; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .caption { fill: #94a3b8; font: 12px Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1400"/>
  <rect class="panel" x="30" y="30" width="1740" height="1340" rx="18"/>

  <text class="title" x="60" y="80">SEWI Platform ERD</text>
  <text class="subtitle" x="60" y="104">Core backend entities derived from prisma/schema.prisma</text>
  <text class="caption" x="60" y="128">Simplified for documentation: user, learning, job, certification, notification, and audit flows.</text>

  <!-- Left column: identity and engagement -->
  <rect class="entity" x="70" y="170" width="300" height="170"/>
  <text class="ename" x="95" y="205">USER</text>
  <text class="attr" x="95" y="232">id, name, email, phone</text>
  <text class="attr" x="95" y="252">role, status, bio</text>
  <text class="attr" x="95" y="272">createdAt, updatedAt</text>

  <rect class="entity" x="70" y="370" width="300" height="150"/>
  <text class="ename" x="95" y="405">USER_SKILL</text>
  <text class="attr" x="95" y="432">id, level, verified</text>
  <text class="attr" x="95" y="452">userId, skillId</text>
  <text class="attr" x="95" y="472">createdAt</text>

  <rect class="entity" x="70" y="550" width="300" height="150"/>
  <text class="ename" x="95" y="585">ENROLLMENT</text>
  <text class="attr" x="95" y="612">id, progress, status</text>
  <text class="attr" x="95" y="632">userId, courseId</text>
  <text class="attr" x="95" y="652">startedAt, completedAt</text>

  <rect class="entity" x="70" y="730" width="300" height="150"/>
  <text class="ename" x="95" y="765">APPLICATION</text>
  <text class="attr" x="95" y="792">id, status</text>
  <text class="attr" x="95" y="812">userId, jobId</text>
  <text class="attr" x="95" y="832">appliedAt, updatedAt</text>

  <rect class="entity" x="70" y="910" width="300" height="140"/>
  <text class="ename" x="95" y="945">NOTIFICATION</text>
  <text class="attr" x="95" y="972">id, type, payload</text>
  <text class="attr" x="95" y="992">userId, read</text>
  <text class="attr" x="95" y="1012">createdAt</text>

  <rect class="entity" x="70" y="1080" width="300" height="140"/>
  <text class="ename" x="95" y="1115">AUDITLOG</text>
  <text class="attr" x="95" y="1142">id, actorId, action</text>
  <text class="attr" x="95" y="1162">meta, createdAt</text>

  <!-- Center column: learning/certification -->
  <rect class="entity2" x="410" y="190" width="340" height="170"/>
  <text class="ename" x="435" y="225">COURSE</text>
  <text class="attr" x="435" y="252">id, title, slug, description</text>
  <text class="attr" x="435" y="272">published, institutionId</text>
  <text class="attr" x="435" y="292">createdAt</text>

  <rect class="entity2" x="410" y="390" width="340" height="150"/>
  <text class="ename" x="435" y="425">COURSE_MODULE</text>
  <text class="attr" x="435" y="452">id, courseId, title</text>
  <text class="attr" x="435" y="472">content, order</text>

  <rect class="entity2" x="410" y="570" width="340" height="150"/>
  <text class="ename" x="435" y="605">CERTIFICATION</text>
  <text class="attr" x="435" y="632">id, code</text>
  <text class="attr" x="435" y="652">userId, courseId, issuerId</text>
  <text class="attr" x="435" y="672">issuedAt, expiresAt</text>

  <rect class="entity2" x="410" y="750" width="340" height="150"/>
  <text class="ename" x="435" y="785">COURSE_SKILL</text>
  <text class="attr" x="435" y="812">id, courseId, skillId</text>

  <!-- Right column: organization/job/skills -->
  <rect class="entity3" x="820" y="170" width="360" height="170"/>
  <text class="ename" x="845" y="205">ORGANIZATION</text>
  <text class="attr" x="845" y="232">id, name, type, website</text>
  <text class="attr" x="845" y="252">createdAt</text>

  <rect class="entity3" x="820" y="370" width="360" height="150"/>
  <text class="ename" x="845" y="405">JOB</text>
  <text class="attr" x="845" y="432">id, title, slug, description</text>
  <text class="attr" x="845" y="452">location, jobType, salaryMin, salaryMax</text>
  <text class="attr" x="845" y="472">employerId, postedAt</text>

  <rect class="entity3" x="820" y="550" width="360" height="150"/>
  <text class="ename" x="845" y="585">JOB_SKILL</text>
  <text class="attr" x="845" y="612">id, jobId, skillId</text>

  <rect class="entity3" x="820" y="730" width="360" height="150"/>
  <text class="ename" x="845" y="765">SKILL</text>
  <text class="attr" x="845" y="792">id, name, tag</text>

  <!-- Far right: relationship summary -->
  <rect class="entity" x="1215" y="170" width="520" height="180"/>
  <text class="ename" x="1240" y="205">RELATIONSHIP SUMMARY</text>
  <text class="attr" x="1240" y="235">USER 1..* USER_SKILL, ENROLLMENT, APPLICATION, NOTIFICATION, AUDITLOG</text>
  <text class="attr" x="1240" y="258">COURSE 1..* COURSE_MODULE, ENROLLMENT, CERTIFICATION, COURSE_SKILL</text>
  <text class="attr" x="1240" y="281">ORGANIZATION 1..* COURSE, JOB, CERTIFICATION</text>
  <text class="attr" x="1240" y="304">SKILL 1..* USER_SKILL, JOB_SKILL, COURSE_SKILL</text>

  <!-- Relation lines -->
  <path class="rel" d="M370 255 C 395 255, 395 255, 410 255"/>
  <path class="rel" d="M370 445 C 395 445, 395 635, 410 635"/>
  <path class="rel" d="M370 625 C 395 625, 395 635, 410 635"/>
  <path class="rel" d="M370 805 C 395 805, 395 805, 820 805"/>
  <path class="rel" d="M370 980 C 395 980, 395 980, 820 980"/>
  <path class="rel" d="M370 1150 C 395 1150, 395 1150, 820 1150"/>

  <path class="rel2" d="M750 275 C 790 275, 790 255, 820 255"/>
  <path class="rel2" d="M750 465 C 790 465, 790 465, 820 465"/>
  <path class="rel2" d="M750 645 C 790 645, 790 645, 820 645"/>
  <path class="rel2" d="M750 825 C 790 825, 790 825, 820 825"/>

  <path class="rel" d="M1180 255 C 1200 255, 1200 255, 1215 255"/>
  <path class="rel" d="M1180 445 C 1200 445, 1200 445, 1215 445"/>
  <path class="rel" d="M1180 625 C 1200 625, 1200 625, 1215 625"/>
  <path class="rel" d="M1180 805 C 1200 805, 1200 805, 1215 805"/>

  <text class="caption" x="60" y="1325">Legend: blue = identity/engagement, green = learning/certification, amber = organization/job/skill.</text>
</svg>
